<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVE FILE IMPORTER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #aaaaaa;
    --yellow: #ffe000;
    --bg: #000000;
    --surface: #0a0a0a;
    --border: #333;
    --text: #ffffff;
    --dim: #666;
    --success: #00ff6a;
    --error: #ff3333;

    --fs-xl:   clamp(13px, 2.2vw, 22px);
    --fs-lg:   clamp(9px,  1.4vw, 14px);
    --fs-md:   clamp(8px,  1.1vw, 11px);
    --fs-sm:   clamp(7px,  0.9vw, 9px);
    --fs-xs:   clamp(6px,  0.75vw, 8px);

    --gap:     clamp(10px, 1.8vw, 20px);
    --pad:     clamp(16px, 3vw,   32px);
    --shadow:  clamp(3px, 0.6vw, 6px);
    --border-w: clamp(2px, 0.25vw, 3px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    font-size: var(--fs-sm);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: var(--pad) clamp(12px, 5vw, 80px) clamp(40px, 6vw, 80px);
    image-rendering: pixelated;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .wrap {
    width: 100%;
    max-width: clamp(300px, 65vw, 720px);
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: clamp(24px, 4vw, 48px);
  }

  .heart {
    font-size: clamp(22px, 3.5vw, 40px);
    display: block;
    margin-bottom: clamp(8px, 1.2vw, 16px);
    animation: heartbeat 1.2s steps(1) infinite;
  }

  @keyframes heartbeat {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.7; transform: scale(0.9); }
  }

  h1 {
    font-size: var(--fs-xl);
    letter-spacing: 0.15em;
    color: var(--yellow);
    line-height: 1.9;
    text-shadow: 3px 3px 0 rgba(255,224,0,0.18);
  }

  .subtitle {
    margin-top: clamp(6px, 1vw, 12px);
    color: var(--dim);
    font-size: var(--fs-xs);
    letter-spacing: 0.1em;
  }

  /* ── Cards ── */
  .card {
    width: 100%;
    border: var(--border-w) solid var(--accent);
    box-shadow: var(--shadow) var(--shadow) 0 var(--accent);
    background: var(--surface);
    padding: clamp(16px, 2.5vw, 28px);
    margin-bottom: var(--gap);
  }

  .card-title {
    font-size: var(--fs-xs);
    color: var(--accent);
    letter-spacing: 0.18em;
    margin-bottom: var(--gap);
    padding-bottom: clamp(8px, 1vw, 12px);
    border-bottom: 1px solid var(--border);
  }

  /* ── Filename input ── */
  .filename-row {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    background: #050505;
    transition: border-color 0.1s;
  }

  .filename-row:focus-within { border-color: var(--accent); }

  .filename-input {
    flex: 1;
    font-family: 'Press Start 2P', monospace;
    font-size: var(--fs-sm);
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    padding: clamp(8px, 1.2vw, 13px) clamp(10px, 1.5vw, 14px);
    letter-spacing: 0.08em;
    min-width: 0;
  }

  .filename-ext {
    font-size: var(--fs-sm);
    color: var(--dim);
    padding: 0 clamp(10px, 1.5vw, 14px) 0 0;
    letter-spacing: 0.08em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Drop zone ── */
  .drop-zone {
    width: 100%;
    border: var(--border-w) dashed var(--border);
    background: #050505;
    padding: clamp(24px, 4vw, 44px) clamp(16px, 3vw, 32px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 1.2vw, 14px);
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s;
    position: relative;
    text-align: center;
  }

  .drop-zone:hover,
  .drop-zone.drag-over {
    border-color: var(--yellow);
    background: #0d0d00;
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: clamp(20px, 3vw, 32px);
    color: var(--dim);
    transition: color 0.1s;
    line-height: 1;
  }

  .drop-zone:hover .drop-icon,
  .drop-zone.drag-over .drop-icon {
    color: var(--yellow);
  }

  .drop-label {
    font-size: var(--fs-sm);
    color: var(--dim);
    letter-spacing: 0.12em;
    line-height: 1.8;
  }

  .drop-sub {
    font-size: var(--fs-xs);
    color: #444;
    letter-spacing: 0.08em;
  }

  /* ── File list ── */
  .file-list {
    display: flex;
    flex-direction: column;
    gap: clamp(5px, 0.8vw, 8px);
    margin-top: var(--gap);
  }

  .file-list:empty { display: none; }

  .file-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: clamp(8px, 1.5vw, 14px);
    padding: clamp(8px, 1.2vw, 12px) clamp(10px, 1.5vw, 14px);
    border: 1px solid var(--success);
    background: #050505;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.12s steps(1) forwards;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .file-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--success);
  }

  .file-info { min-width: 0; }

  .file-name {
    font-size: var(--fs-sm);
    color: var(--success);
    letter-spacing: 0.07em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-size {
    font-size: var(--fs-xs);
    color: var(--dim);
    letter-spacing: 0.05em;
    margin-top: clamp(3px, 0.5vw, 5px);
  }

  .file-checkmark {
    font-size: var(--fs-sm);
    color: var(--success);
    white-space: nowrap;
  }

  /* ── Delete button ── */
  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 1.6vw, 16px);
    color: var(--yellow);
    line-height: 1;
    padding: 2px 4px;
    transition: color 0.08s, transform 0.08s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .delete-btn:hover {
    color: var(--error);
    transform: scale(1.2);
  }

  .delete-btn:active {
    transform: scale(0.9);
  }

  /* ── Empty state ── */
  .empty-notice {
    font-size: var(--fs-xs);
    color: #333;
    letter-spacing: 0.1em;
    text-align: center;
    padding: clamp(10px, 1.5vw, 16px) 0 clamp(4px, 0.6vw, 8px);
  }

  /* ── Export button ── */
  .write-btn {
    width: 100%;
    font-family: 'Press Start 2P', monospace;
    font-size: var(--fs-md);
    letter-spacing: 0.18em;
    padding: clamp(12px, 1.8vw, 20px);
    border: var(--border-w) solid var(--yellow);
    box-shadow: var(--shadow) var(--shadow) 0 var(--yellow);
    background: var(--yellow);
    color: #000;
    cursor: pointer;
    transition: box-shadow 0.05s, transform 0.05s;
    margin-bottom: clamp(16px, 2.5vw, 28px);
  }

  .write-btn:hover {
    box-shadow: calc(var(--shadow) / 2) calc(var(--shadow) / 2) 0 var(--yellow);
    transform: translate(calc(var(--shadow) / 2), calc(var(--shadow) / 2));
  }

  .write-btn:active {
    box-shadow: 0 0 0 var(--yellow);
    transform: translate(var(--shadow), var(--shadow));
  }

  .write-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    box-shadow: var(--shadow) var(--shadow) 0 var(--yellow);
  }

  /* ── Count badge ── */
  .file-count {
    font-size: var(--fs-xs);
    color: var(--dim);
    letter-spacing: 0.1em;
    margin-bottom: var(--gap);
    padding-bottom: clamp(8px, 1vw, 12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .file-count .count-num {
    color: var(--success);
  }

  .clear-all-btn {
    background: none;
    border: 1px solid var(--border);
    font-family: 'Press Start 2P', monospace;
    font-size: var(--fs-xs);
    color: var(--dim);
    cursor: pointer;
    padding: 4px 8px;
    letter-spacing: 0.06em;
    transition: border-color 0.1s, color 0.1s;
  }

  .clear-all-btn:hover {
    border-color: var(--error);
    color: var(--error);
  }

  /* ── Deco ── */
  .deco {
    font-size: var(--fs-xs);
    color: var(--dim);
    text-align: center;
    margin-top: clamp(6px, 1vw, 12px);
    letter-spacing: 0.3em;
  }

  .idbport-ref {
    margin-top: clamp(16px, 2.5vw, 28px);
    text-align: center;
    font-size: var(--fs-xs);
    color: var(--dim);
    letter-spacing: 0.08em;
    line-height: 2;
  }

  .idbport-ref a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
    transition: color 0.1s, border-color 0.1s;
  }

  .idbport-ref a:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  @media (max-width: 400px) {
    .file-item { grid-template-columns: 1fr auto; }
    .file-checkmark { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <span class="heart">♥</span>
    <h1>SAVE FILE<br>IMPORTER</h1>
    <p class="subtitle">* export save data as .idb for idbport</p>
  </div>

  <!-- Filename -->
  <div class="card">
    <div class="card-title">▶ OUTPUT FILENAME</div>
    <div class="filename-row">
      <input class="filename-input" id="filename-input" type="text" placeholder="mysave" spellcheck="false" autocomplete="off" />
      <span class="filename-ext">.idb</span>
    </div>
  </div>

  <!-- File importer -->
  <div class="card">
    <div class="card-title">▶ SAVE FILES</div>

    <!-- Drop zone -->
    <label class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" multiple />
      <div class="drop-icon">▼</div>
      <div class="drop-label">DROP FILES HERE<br>OR CLICK TO BROWSE</div>
      <div class="drop-sub">any save files · multiple allowed</div>
    </label>

    <!-- File list -->
    <div class="file-list" id="file-list"></div>
    <div class="empty-notice" id="empty-notice">no files loaded yet</div>
  </div>

  <!-- File count + clear all -->
  <div class="file-count" id="file-count-row" style="display:none;">
    <span><span class="count-num" id="count-num">0</span> FILE(S) READY</span>
    <button class="clear-all-btn" onclick="clearAll()">✕ CLEAR ALL</button>
  </div>

  <button class="write-btn" id="export-btn" onclick="exportIDB()" disabled>★ EXPORT .IDB FILE ★</button>

  <div class="deco">* * * * * * * *</div>

  <div class="idbport-ref">
    requires the idbport chrome extension<br>
    <a href="https://chromewebstore.google.com/detail/idbport/kmpakemocjdhfcpfggpodkjhmjibhhhm" target="_blank" rel="noopener">get idbport →</a>
  </div>

</div>

<script>
const DB_NAME    = '/_savedata';
const DB_VERSION = 21;
const STORE      = 'FILE_DATA';
const KEY_PREFIX = '/_savedata/';

// key → ArrayBuffer
let fileData = {};

/* ── Helpers ── */
function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'b';
  return (bytes / 1024).toFixed(1) + 'kb';
}

/* ── Render ── */
function render() {
  const list    = document.getElementById('file-list');
  const notice  = document.getElementById('empty-notice');
  const countRow = document.getElementById('file-count-row');
  const countNum = document.getElementById('count-num');
  const exportBtn = document.getElementById('export-btn');

  const keys = Object.keys(fileData);
  list.innerHTML = '';

  if (keys.length === 0) {
    notice.style.display = '';
    countRow.style.display = 'none';
    exportBtn.disabled = true;
    return;
  }

  notice.style.display = 'none';
  countRow.style.display = 'flex';
  countNum.textContent = keys.length;
  exportBtn.disabled = false;

  keys.forEach(key => {
    const item = document.createElement('div');
    item.className = 'file-item';

    const info = document.createElement('div');
    info.className = 'file-info';
    info.innerHTML = `
      <div class="file-name">${escHtml(key)}</div>
      <div class="file-size">${formatSize(fileData[key].byteLength)}</div>
    `;

    const check = document.createElement('div');
    check.className = 'file-checkmark';
    check.textContent = '✓';

    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.title = 'Remove ' + key;
    del.textContent = '✕';
    del.onclick = () => { delete fileData[key]; render(); };

    item.appendChild(info);
    item.appendChild(check);
    item.appendChild(del);
    list.appendChild(item);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── File input / drag & drop ── */
const fileInput = document.getElementById('file-input');
const dropZone  = document.getElementById('drop-zone');

fileInput.addEventListener('change', e => {
  loadFiles(e.target.files);
  fileInput.value = ''; // reset so same file can be re-added after removal
});

dropZone.addEventListener('dragenter', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', e => { dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  loadFiles(e.dataTransfer.files);
});

function loadFiles(fileList) {
  Array.from(fileList).forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      fileData[file.name] = reader.result;
      render();
    };
    reader.readAsArrayBuffer(file);
  });
}

function clearAll() {
  fileData = {};
  render();
}

/* ── Export ── */
function toBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function makeHeader(recordCount) {
  return JSON.stringify([
    { name: 1, version: 2, stores: 3 },
    DB_NAME, DB_VERSION, [4],
    { name: 5, count: 6 },
    STORE, recordCount
  ]);
}

function makeRecord(key, b64) {
  return JSON.stringify([
    { storeName: 1, key: 2, value: 3 },
    STORE, KEY_PREFIX + key,
    { timestamp: 4, mode: 5, contents: 6 },
    ['Date', new Date().toISOString()],
    33206,
    ['Int8Array', b64]
  ]);
}

function exportIDB() {
  const nameInput = document.getElementById('filename-input').value.trim();
  if (!nameInput) { alert('Please enter a filename.'); return; }

  const keys = Object.keys(fileData);
  if (keys.length === 0) { alert('No files loaded.'); return; }

  const records = keys.map(k => [k, toBase64(fileData[k])]);

  const lines = [
    makeHeader(records.length),
    ...records.map(([k, b64]) => makeRecord(k, b64)),
  ];

  const blob = new Blob([lines.join('\n')], { type: 'application/octet-stream' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = nameInput + '.idb'; a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
