<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVE FILE IMPORTER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #aaaaaa;
    --yellow: #ffe000;
    --bg: #000000;
    --surface: #0a0a0a;
    --border: #333;
    --text: #ffffff;
    --dim: #666;
    --success: #00ff6a;
    --error: #ff3333;

    /* Fluid scale: clamp(min, preferred, max) */
    --fs-xl:   clamp(13px, 2.2vw, 22px);
    --fs-lg:   clamp(9px,  1.4vw, 14px);
    --fs-md:   clamp(8px,  1.1vw, 11px);
    --fs-sm:   clamp(7px,  0.9vw, 9px);
    --fs-xs:   clamp(6px,  0.75vw, 8px);

    --gap:     clamp(10px, 1.8vw, 20px);
    --pad:     clamp(16px, 3vw,   32px);
    --radius:  0px;
    --shadow:  clamp(3px, 0.6vw, 6px);
    --border-w: clamp(2px, 0.25vw, 3px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    font-size: var(--fs-sm);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: var(--pad) clamp(12px, 5vw, 80px) clamp(40px, 6vw, 80px);
    image-rendering: pixelated;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── Layout wrapper ── */
  .wrap {
    width: 100%;
    max-width: clamp(300px, 65vw, 720px);
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: clamp(24px, 4vw, 48px);
  }

  .heart {
    font-size: clamp(22px, 3.5vw, 40px);
    display: block;
    margin-bottom: clamp(8px, 1.2vw, 16px);
    animation: heartbeat 1.2s steps(1) infinite;
  }

  @keyframes heartbeat {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.7; transform: scale(0.9); }
  }

  h1 {
    font-size: var(--fs-xl);
    letter-spacing: 0.15em;
    color: var(--yellow);
    line-height: 1.9;
    text-shadow: 3px 3px 0 rgba(255,224,0,0.18);
  }

  .subtitle {
    margin-top: clamp(6px, 1vw, 12px);
    color: var(--dim);
    font-size: var(--fs-xs);
    letter-spacing: 0.1em;
  }

  /* ── Cards ── */
  .card {
    width: 100%;
    border: var(--border-w) solid var(--accent);
    box-shadow: var(--shadow) var(--shadow) 0 var(--accent);
    background: var(--surface);
    padding: clamp(16px, 2.5vw, 28px);
    margin-bottom: var(--gap);
  }

  .card-title {
    font-size: var(--fs-xs);
    color: var(--accent);
    letter-spacing: 0.18em;
    margin-bottom: var(--gap);
    padding-bottom: clamp(8px, 1vw, 12px);
    border-bottom: 1px solid var(--border);
  }

  /* ── Filename input ── */
  .filename-row {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    background: #050505;
    transition: border-color 0.1s;
  }

  .filename-row:focus-within {
    border-color: var(--accent);
  }

  .filename-input {
    flex: 1;
    font-family: 'Press Start 2P', monospace;
    font-size: var(--fs-sm);
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    padding: clamp(8px, 1.2vw, 13px) clamp(10px, 1.5vw, 14px);
    letter-spacing: 0.08em;
    min-width: 0;
  }

  .filename-ext {
    font-size: var(--fs-sm);
    color: var(--dim);
    padding: 0 clamp(10px, 1.5vw, 14px) 0 0;
    letter-spacing: 0.08em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── File slots ── */
  .slots {
    display: flex;
    flex-direction: column;
    gap: clamp(6px, 1vw, 10px);
  }

  .slot {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: clamp(8px, 1.5vw, 14px);
    padding: clamp(8px, 1.2vw, 13px) clamp(10px, 1.5vw, 14px);
    border: 1px solid var(--border);
    background: #050505;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s;
    position: relative;
    overflow: hidden;
  }

  .slot:hover        { border-color: var(--accent); background: #0f0f0f; }
  .slot.loaded       { border-color: var(--success); }
  .slot.required-missing { border-color: var(--error); }

  .slot.loaded::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--success);
  }

  .slot-label {
    font-size: var(--fs-sm);
    color: var(--text);
    letter-spacing: 0.08em;
  }

  .slot-label .asterisk {
    color: var(--yellow);
    margin-left: 0.4em;
  }

  .slot-hint {
    font-size: var(--fs-xs);
    color: var(--dim);
    letter-spacing: 0.05em;
    margin-top: clamp(3px, 0.5vw, 6px);
  }

  .slot-status {
    font-size: var(--fs-xs);
    color: var(--dim);
    white-space: nowrap;
    letter-spacing: 0.05em;
    text-align: right;
  }

  .slot.loaded .slot-status { color: var(--success); }

  .slot input[type="file"] { display: none; }

  /* ── Legend ── */
  .legend {
    font-size: var(--fs-xs);
    color: var(--dim);
    letter-spacing: 0.06em;
    margin-bottom: var(--gap);
    padding-left: 2px;
  }

  .legend .asterisk { color: var(--yellow); }

  /* ── Export button ── */
  .write-btn {
    width: 100%;
    font-family: 'Press Start 2P', monospace;
    font-size: var(--fs-md);
    letter-spacing: 0.18em;
    padding: clamp(12px, 1.8vw, 20px);
    border: var(--border-w) solid var(--yellow);
    box-shadow: var(--shadow) var(--shadow) 0 var(--yellow);
    background: var(--yellow);
    color: #000;
    cursor: pointer;
    transition: box-shadow 0.05s, transform 0.05s;
    margin-bottom: clamp(16px, 2.5vw, 28px);
  }

  .write-btn:hover {
    box-shadow: calc(var(--shadow) / 2) calc(var(--shadow) / 2) 0 var(--yellow);
    transform: translate(calc(var(--shadow) / 2), calc(var(--shadow) / 2));
  }

  .write-btn:active {
    box-shadow: 0 0 0 var(--yellow);
    transform: translate(var(--shadow), var(--shadow));
  }

  /* ── Deco ── */
  .deco {
    font-size: var(--fs-xs);
    color: var(--dim);
    text-align: center;
    margin-top: clamp(6px, 1vw, 12px);
    letter-spacing: 0.3em;
  }

  .idbport-ref {
    margin-top: clamp(16px, 2.5vw, 28px);
    text-align: center;
    font-size: var(--fs-xs);
    color: var(--dim);
    letter-spacing: 0.08em;
    line-height: 2;
  }

  .idbport-ref a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
    transition: color 0.1s, border-color 0.1s;
  }

  .idbport-ref a:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  /* ── Narrow mobile ── */
  @media (max-width: 400px) {
    .slot { grid-template-columns: 1fr; }
    .slot-status { text-align: left; margin-top: 4px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <span class="heart">♥</span>
    <h1>SAVE FILE<br>IMPORTER</h1>
    <p class="subtitle">* export save data as .idb for idbport</p>
  </div>

  <!-- Filename -->
  <div class="card">
    <div class="card-title">▶ OUTPUT FILENAME</div>
    <div class="filename-row">
      <input class="filename-input" id="filename-input" type="text" placeholder="mysave" spellcheck="false" autocomplete="off" />
      <span class="filename-ext">.idb</span>
    </div>
  </div>

  <!-- Save slots -->
  <div class="card">
    <div class="card-title">▶ UNDERTALE SAVE FILES</div>
    <div class="slots" id="slots-container"></div>
  </div>

  <div class="legend"><span class="asterisk">*</span> required &nbsp;·&nbsp; optional files written as empty if not provided</div>

  <button class="write-btn" onclick="exportIDB()">★ EXPORT .IDB FILE ★</button>

  <div class="deco">* * * * * * * *</div>

  <div class="idbport-ref">
    requires the idbport chrome extension<br>
    <a href="https://chromewebstore.google.com/detail/idbport/kmpakemocjdhfcpfggpodkjhmjibhhhm" target="_blank" rel="noopener">get idbport →</a>
  </div>

</div>
<script>
const DB_NAME    = '/_savedata';
const DB_VERSION = 21;
const STORE      = 'FILE_DATA';
const KEY_PREFIX = '/_savedata/';

const UT_FILES = [
  { key: 'dr.ini', label: 'dr.ini', hint: 'game config',     required: true  },
  { key: 'filech1_0',         label: 'filech1_0',          hint: 'ch1 slot 1',       required: false  },
  { key: 'filech1_1',         label: 'filech1_1',          hint: 'ch1 slot 2',     required: false },
  { key: 'filech1_2',         label: 'filech1_2',          hint: 'ch1 slot 3', required: false },

  { key: 'filech2_0',         label: 'filech2_0',          hint: 'ch2 slot 1',       required: false  },
  { key: 'filech2_1',         label: 'filech2_1',          hint: 'ch2 slot 2',     required: false },
  { key: 'filech2_2',         label: 'filech2_2',          hint: 'ch2 slot 3', required: false },

  { key: 'filech3_0',         label: 'filech3_0',          hint: 'ch3 slot 1',       required: false  },
  { key: 'filech3_1',         label: 'filech3_1',          hint: 'ch3 slot 2',     required: false },
  { key: 'filech3_2',         label: 'filech3_2',          hint: 'ch3 slot 3', required: false },

  { key: 'filech4_0',         label: 'filech4_0',          hint: 'ch4 slot 1',       required: false  },
  { key: 'filech4_1',         label: 'filech4_1',          hint: 'ch4 slot 2',     required: false },
  { key: 'filech4_2',         label: 'filech4_2',          hint: 'ch4 slot 3', required: false },
];

const EMPTY_KEYS = ['keyconfig_0.ini', 'keyconfig_3.ini', 'trophies.ini'];

let fileData = {};

function renderSlots() {
  const container = document.getElementById('slots-container');
  container.innerHTML = '';

  UT_FILES.forEach(f => {
    const isLoaded  = !!fileData[f.key];
    const isMissing = f.required && !isLoaded;

    const slot = document.createElement('label');
    slot.className = 'slot' + (isLoaded ? ' loaded' : isMissing ? ' required-missing' : '');
    slot.htmlFor = 'input-' + f.key;

    const input = document.createElement('input');
    input.type = 'file';
    input.id   = 'input-' + f.key;
    input.addEventListener('change', e => handleFile(e, f.key));

    const left = document.createElement('div');
    left.innerHTML = `
      <div class="slot-label">${f.label}${f.required ? '<span class="asterisk">*</span>' : ''}</div>
      <div class="slot-hint">${f.hint}${!f.required ? ' · optional' : ''}</div>
    `;

    const status = document.createElement('div');
    status.className = 'slot-status';
    status.textContent = isLoaded
      ? `✓ ${(fileData[f.key].byteLength / 1024).toFixed(1)}kb`
      : f.required ? '[ required ]' : '[ optional ]';

    slot.appendChild(input);
    slot.appendChild(left);
    slot.appendChild(status);
    container.appendChild(slot);
  });
}

function handleFile(e, key) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => { fileData[key] = reader.result; renderSlots(); };
  reader.readAsArrayBuffer(file);
}

function toBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function makeHeader(recordCount) {
  return JSON.stringify([
    { name: 1, version: 2, stores: 3 },
    DB_NAME, DB_VERSION, [4],
    { name: 5, count: 6 },
    STORE, recordCount
  ]);
}

function makeRecord(key, b64) {
  return JSON.stringify([
    { storeName: 1, key: 2, value: 3 },
    STORE, KEY_PREFIX + key,
    { timestamp: 4, mode: 5, contents: 6 },
    ['Date', new Date().toISOString()],
    33206,
    ['Int8Array', b64]
  ]);
}

function exportIDB() {
  const missing = UT_FILES.filter(f => f.required && !fileData[f.key]);
  if (missing.length > 0) {
    alert('Missing required files:\n' + missing.map(f => f.label).join('\n'));
    renderSlots();
    return;
  }

  const nameInput = document.getElementById('filename-input').value.trim();
  if (!nameInput) { alert('Please enter a filename.'); return; }

  const records = [
    ...UT_FILES.map(f => [f.key, fileData[f.key] ? toBase64(fileData[f.key]) : '']),
    ...EMPTY_KEYS.map(k => [k, '']),
  ];

  const lines = [
    makeHeader(records.length),
    ...records.map(([k, b64]) => makeRecord(k, b64)),
  ];

  const blob = new Blob([lines.join('\n')], { type: 'application/octet-stream' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = nameInput + '.idb'; a.click();
  URL.revokeObjectURL(url);
}

renderSlots();
</script>
</body>
</html>
